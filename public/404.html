<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback:
      // redirect any /path back to /?p=/path so the app can restore routing client-side.
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        var base = path.split('/').slice(0, -1).join('/') + '/';
        var target = base + '?p=' + encodeURIComponent(path) + '&q=' + encodeURIComponent(search) + '&h=' + encodeURIComponent(hash);
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
